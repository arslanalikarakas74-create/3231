<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Akıllı Trafik Tahmini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #eef4f7;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-strong: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(15, 23, 42, 0.08);
      --shadow: 0 20px 50px rgba(2, 6, 23, 0.12);
      --teal: #0f766e;
      --blue: #0284c7;
      --red: #ef4444;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    .app { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .topbar { padding: 18px 18px 12px; display: flex; gap: 12px; align-items: stretch; }
    .brand, .api-card { background: var(--panel); border: 1px solid var(--border); border-radius: 22px; box-shadow: var(--shadow); backdrop-filter: blur(18px); }
    .brand { flex: 1; padding: 16px; }
    .title { margin: 0; font-size: 20px; font-weight: 800; }
    .subtitle { margin: 8px 0 0; font-size: 13px; color: var(--muted); }
    
    .api-card { width: 170px; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
    .api-card label { font-size: 12px; color: var(--muted); font-weight: 600; }
    .api-card input { width: 100%; border: 1px solid var(--border); border-radius: 14px; padding: 10px 12px; font-size: 12px; outline: none; background: rgba(255, 255, 255, 0.98); }
    
    .map-wrap { position: relative; flex: 1; margin: 0 14px 14px; border-radius: 30px; overflow: hidden; border: 1px solid rgba(255,255,255,0.7); box-shadow: var(--shadow); }
    #map { width: 100%; height: 100%; }
    .sheet { position: relative; background: var(--panel-strong); border-radius: 28px 28px 0 0; padding: 10px 18px 18px; max-height: 44vh; overflow-y: auto; }
    .sheet-handle { width: 54px; height: 5px; margin: 0 auto 14px; border-radius: 999px; background: #cbd5e1; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card { background: #fff; border: 1px solid var(--border); border-radius: 22px; padding: 14px; }
    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field input { border: 1px solid var(--border); border-radius: 16px; padding: 14px; outline: none; }
    .button { border: 0; border-radius: 18px; padding: 15px; font-weight: 800; color: white; background: var(--teal); cursor: pointer; flex: 1; }
    .ghost { background: #eee; color: var(--text); }
    .result { margin-top: 14px; padding: 16px; border-radius: 22px; background: var(--teal); color: white; display: none; }
    .result.visible { display: block; }
    .loader { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); z-index: 9000; }
    .loader.show { display: flex; }
    .spinner { width: 50px; height: 50px; border: 5px solid #fff; border-top-color: var(--teal); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <h1 class="title">Akıllı Trafik Tahmini</h1>
        <p class="subtitle">Rota analizi için noktaları ve zamanı seçin.</p>
      </div>
      
      <div class="api-card">
        <div style="display: flex; justify-content: center; margin-bottom: 8px;">
          <img src="/static/3F9Dq.jpg" alt="Logo" style="width: 70px; height: auto; border-radius: 8px;">
        </div>
        <label for="apiUrl">API Base URL</label>
        <input id="apiUrl" value="https://trafik-gvdf.onrender.com" autocomplete="off" />
      </div>
    </div>

    <div class="map-wrap"><div id="map"></div></div>

    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="grid">
        <div class="card"><strong>Başlangıç:</strong><div id="originText">Seçilmedi</div></div>
        <div class="card"><strong>Varış:</strong><div id="destinationText">Seçilmedi</div></div>
      </div>
      <div class="controls">
        <div class="field"><label>Tarih</label><input id="travelDate" type="date" /></div>
        <div class="field"><label>Saat</label><input id="travelTime" type="time" /></div>
      </div>
      <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button id="predictBtn" class="button">Tahmin Et</button>
        <button id="resetBtn" class="button ghost">Sıfırla</button>
      </div>
      <div id="result" class="result"><h3>Sonuç</h3><div id="resVal"></div></div>
    </div>
  </div>

  <div id="loader" class="loader"><div class="spinner"></div></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Harita ve Tahmin mantığı burada kalmaya devam edecek...
    // (Kodun geri kalanını bozmadan buraya yapıştırabilirsin)
  </script>
</body>
</html>
